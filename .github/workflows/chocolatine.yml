name: Chocolatine

on:
  push:
    branches-ignore:
      - 'no-ga/**'
  pull_request:
    branches-ignore:
      - 'no-ga/**'

env:
  MIRROR_SSH_URL: "git@github.com:EpitechPGE1-2025/G-DOP-200-MLN-2-1-chocolatine-7.git"
  EXECUTABLES: "my_executable"

jobs:
  check_compilation_and_coding_style:
    name: Check compilation and coding style
    runs-on: ubuntu-latest
    if: github.repository != vars.MIRROR_REPO
    container:
      image: epitechcontent/epitest-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run banana-check-repo
        run: banana-check-repo

      - name: Compile with make
        timeout-minutes: 2
        run: make CC=epiclang

      - name: Display coding style errors
        run: |
          if [ -f coding-style-reports.log ]; then
            while IFS= read -r line; do
              file=$(echo "$line" | cut -d':' -f1)
              lineno=$(echo "$line" | cut -d':' -f2)
              msg=$(echo "$line" | cut -d':' -f3-)
              echo "::error file=${file},line=${lineno}::${msg}"
            done < coding-style-reports.log
          fi

      - name: Fail if coding style errors
        run: |
          if [ -f coding-style-reports.log ] && [ -s coding-style-reports.log ]; then
            exit 1
          fi

      - name: Clean build artifacts
        run: make clean

      - name: Verify executables exist and are executable
        run: |
          for exec in $(echo "$EXECUTABLES" | tr ',' ' '); do
            exec=$(echo "$exec" | xargs)
            if [ ! -f "$exec" ]; then
              echo "::error::Executable '$exec' not found"
              exit 1
            fi
            if [ ! -x "$exec" ]; then
              echo "::error::File '$exec' is not executable"
              exit 1
            fi
          done

  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    needs: check_compilation_and_coding_style
    container:
      image: epitechcontent/epitest-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run tests
        timeout-minutes: 2
        run: make tests_run

  push_to_mirror:
    name: Push to mirror repository
    runs-on: ubuntu-latest
    needs: run_tests
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Epitech repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}